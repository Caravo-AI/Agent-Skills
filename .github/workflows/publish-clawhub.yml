name: Publish to ClawHub

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Authenticate with ClawHub
        run: npx clawhub@latest login --token "${{ secrets.CLAWHUB_TOKEN }}" --no-browser --registry https://clawhub.ai/api

      - name: Read version from SKILL.md
        id: version
        run: |
          VERSION=$(grep 'version:' SKILL.md | head -1 | sed 's/.*version: *"\{0,1\}\([0-9.]*\)"\{0,1\}/\1/')
          echo "Version: $VERSION"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Publish skill
        run: |
          npx clawhub@latest publish . \
            --slug caravo \
            --name "Caravo Service Marketplace" \
            --version "${{ steps.version.outputs.version }}" \
            --registry https://clawhub.ai/api
